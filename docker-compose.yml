services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: uit_se357
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d uit_se357"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/uit_se357?schema=public
      AUTH_SECRET: your_jwt_access_token_secret
      AUTH_SECRET_EXPIRES_IN: 24h
      AUTH_REFRESH_SECRET: your_jwt_refresh_token_secret
      AUTH_REFRESH_SECRET_EXPIRES_IN: 180000000
      EMAIL_HOST: smtp.gmail.com
      EMAIL_PORT: 587
      EMAIL_USER: your_email@gmail.com
      EMAIL_PASSWORD: your_app_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX: 5
      MAX_LOGIN_ATTEMPTS: 5
      LOCKOUT_TIME_MS: 900000
      AUDIT_LOG_DIR: /app/logs/audit
      AUDIT_RETENTION_DAYS: 365
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - server-logs:/app/logs

  web:
    build:
      context: ./client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "80:80"

volumes:
  postgres-data:
  server-logs: