apiVersion: v1
kind: ServiceAccount
metadata:
  name: leader-elector-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: leader-elector-role
rules:
  - apiGroups: [""]
    resources: ["endpoints"]
    verbs: ["get","create","patch","update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: leader-elector-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: leader-elector-role
subjects:
  - kind: ServiceAccount
    name: leader-elector-sa
    namespace: uit-se357
