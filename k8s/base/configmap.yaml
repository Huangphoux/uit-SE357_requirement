apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  NODE_ENV: production
  APP_HOST: 0.0.0.0
  APP_PORT: "8000"
  POSTGRES_DB: uit_se357
  POSTGRES_USER: postgres
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  RATE_LIMIT_WINDOW_MS: "60000"
  RATE_LIMIT_MAX: "5"
  MAX_LOGIN_ATTEMPTS: "5"
  LOCKOUT_TIME_MS: "900000"
  AUDIT_LOG_DIR: /app/logs/audit
  AUDIT_RETENTION_DAYS: "365"
